<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6C63FF;
            --secondary-color: #00D9FF;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --gradient: linear-gradient(135deg, #6C63FF 0%, #00D9FF 100%);
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--dark-bg);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: var(--card-bg);
            border-right: 1px solid rgba(108, 99, 255, 0.2);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(108, 99, 255, 0.2);
        }

        .sidebar-header i {
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .sidebar-header h2 {
            color: var(--text-primary);
            font-size: 1.3rem;
        }

        .sidebar-header p {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(108, 99, 255, 0.2);
            color: var(--text-primary);
        }

        .nav-link i {
            width: 20px;
        }

        .nav-link .badge {
            margin-left: auto;
            background: var(--danger);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .logout-btn {
            margin-top: auto;
            padding: 1rem;
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--danger);
            border-radius: 10px;
            color: var(--danger);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 1.8rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid rgba(108, 99, 255, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .stat-card .icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .stat-card .icon.blue {
            background: rgba(108, 99, 255, 0.2);
            color: var(--primary-color);
        }

        .stat-card .icon.green {
            background: rgba(39, 174, 96, 0.2);
            color: var(--success);
        }

        .stat-card .icon.orange {
            background: rgba(243, 156, 18, 0.2);
            color: var(--warning);
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: bold;
        }

        /* Messages Table */
        .messages-container {
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid rgba(108, 99, 255, 0.2);
            overflow: hidden;
        }

        .messages-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(108, 99, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages-header h2 {
            color: var(--text-primary);
            font-size: 1.3rem;
        }

        .refresh-btn {
            padding: 0.5rem 1rem;
            background: rgba(108, 99, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .messages-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .message-item {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(108, 99, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .message-item:hover {
            background: rgba(108, 99, 255, 0.1);
        }

        .message-item:last-child {
            border-bottom: none;
        }

        .message-item.unread {
            border-left: 3px solid var(--primary-color);
            background: rgba(108, 99, 255, 0.05);
        }

        .message-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .message-sender {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .message-sender .avatar {
            width: 40px;
            height: 40px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }

        .message-sender .info h4 {
            color: var(--text-primary);
            font-size: 1rem;
        }

        .message-sender .info p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .message-meta {
            text-align: right;
        }

        .message-meta .timestamp {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .message-meta .unread-badge {
            background: var(--primary-color);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 0.3rem;
            display: inline-block;
        }

        .message-subject {
            color: var(--text-primary);
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
        }

        .message-preview {
            color: var(--text-secondary);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 500px;
        }

        .message-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .action-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .action-btn.delete {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        .action-btn.delete:hover {
            background: var(--danger);
            color: white;
        }

        /* Message Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(108, 99, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: var(--text-primary);
            font-size: 1.3rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-modal:hover {
            color: var(--danger);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(108, 99, 255, 0.1);
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-row i {
            width: 40px;
            height: 40px;
            background: rgba(108, 99, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .detail-content {
            flex: 1;
        }

        .detail-content label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .detail-content p {
            color: var(--text-primary);
            font-size: 1rem;
            word-break: break-word;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 1rem;
            }

            .sidebar-header h2,
            .sidebar-header p,
            .nav-link span,
            .logout-btn span {
                display: none;
            }

            .nav-link {
                justify-content: center;
                padding: 1rem;
            }

            .nav-link .badge {
                position: absolute;
                top: 5px;
                right: 5px;
                padding: 0.1rem 0.4rem;
                font-size: 0.6rem;
            }

            .logout-btn {
                padding: 1rem;
            }

            .main-content {
                margin-left: 70px;
            }

            .message-preview {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shield-alt"></i>
            <h2>Admin Panel</h2>
            <p>Portfolio</p>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="#" class="nav-link active">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                    <span class="badge" id="unreadBadge">0</span>
                </a>
            </div>
        </nav>

        <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <h1><i class="fas fa-inbox"></i> Contact Messages</h1>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon blue">
                    <i class="fas fa-envelope"></i>
                </div>
                <h3>Total Messages</h3>
                <div class="value" id="totalMessages">0</div>
            </div>
            <div class="stat-card">
                <div class="icon green">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h3>Read Messages</h3>
                <div class="value" id="readMessages">0</div>
            </div>
            <div class="stat-card">
                <div class="icon orange">
                    <i class="fas fa-envelope-open"></i>
                </div>
                <h3>Unread Messages</h3>
                <div class="value" id="unreadCount">0</div>
            </div>
        </div>

        <!-- Messages List -->
        <div class="messages-container">
            <div class="messages-header">
                <h2><i class="fas fa-list"></i> All Messages</h2>
                <button class="refresh-btn" onclick="loadMessages()">
                    <i class="fas fa-sync-alt"></i>
                    Refresh
                </button>
            </div>
            <div class="messages-list" id="messagesList">
                <!-- Messages will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Message Detail Modal -->
    <div class="modal" id="messageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-envelope-open"></i> Message Details</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Message details will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Check admin authentication
        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('admin_logged_in');
            if (!isLoggedIn) {
                window.location.href = 'admin-login.html';
                return false;
            }
            
            // Check session timeout (24 hours)
            const loginTime = sessionStorage.getItem('admin_login_time');
            if (loginTime && Date.now() - loginTime > 24 * 60 * 60 * 1000) {
                sessionStorage.removeItem('admin_logged_in');
                sessionStorage.removeItem('admin_login_time');
                window.location.href = 'admin-login.html';
                return false;
            }
            
            return true;
        }

        // Load messages from localStorage
        function loadMessages() {
            if (!checkAuth()) return;

            const messages = JSON.parse(localStorage.getItem('portfolio_messages') || '[]');
            
            // Update stats
            const total = messages.length;
            const read = messages.filter(m => m.read).length;
            const unread = total - read;

            document.getElementById('totalMessages').textContent = total;
            document.getElementById('readMessages').textContent = read;
            document.getElementById('unreadCount').textContent = unread;
            document.getElementById('unreadBadge').textContent = unread;

            // Render messages
            const messagesList = document.getElementById('messagesList');
            
            if (messages.length === 0) {
                messagesList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Messages Yet</h3>
                        <p>Contact form submissions will appear here</p>
                    </div>
                `;
                return;
            }

            messagesList.innerHTML = messages.map(message => `
                <div class="message-item ${message.read ? '' : 'unread'}" onclick="viewMessage(${message.id})">
                    <div class="message-top">
                        <div class="message-sender">
                            <div class="avatar">${message.name.charAt(0).toUpperCase()}</div>
                            <div class="info">
                                <h4>${escapeHtml(message.name)}</h4>
                                <p>${escapeHtml(message.email)}</p>
                            </div>
                        </div>
                        <div class="message-meta">
                            <div class="timestamp">${formatDate(message.timestamp)}</div>
                            ${!message.read ? '<div class="unread-badge">New</div>' : ''}
                        </div>
                    </div>
                    <div class="message-subject">${escapeHtml(message.subject)}</div>
                    <div class="message-preview">${escapeHtml(message.message)}</div>
                    <div class="message-actions">
                        <button class="action-btn delete" onclick="event.stopPropagation(); deleteMessage(${message.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // View message details
        function viewMessage(id) {
            const messages = JSON.parse(localStorage.getItem('portfolio_messages') || '[]');
            const message = messages.find(m => m.id === id);
            
            if (!message) return;

            // Mark as read
            if (!message.read) {
                message.read = true;
                localStorage.setItem('portfolio_messages', JSON.stringify(messages));
                loadMessages();
            }

            // Show modal
            const modal = document.getElementById('messageModal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="detail-row">
                    <i class="fas fa-user"></i>
                    <div class="detail-content">
                        <label>Name</label>
                        <p>${escapeHtml(message.name)}</p>
                    </div>
                </div>
                <div class="detail-row">
                    <i class="fas fa-envelope"></i>
                    <div class="detail-content">
                        <label>Email</label>
                        <p>${escapeHtml(message.email)}</p>
                    </div>
                </div>
                ${message.phone ? `
                <div class="detail-row">
                    <i class="fas fa-phone"></i>
                    <div class="detail-content">
                        <label>Phone</label>
                        <p>${escapeHtml(message.phone)}</p>
                    </div>
                </div>
                ` : ''}
                <div class="detail-row">
                    <i class="fas fa-heading"></i>
                    <div class="detail-content">
                        <label>Subject</label>
                        <p>${escapeHtml(message.subject)}</p>
                    </div>
                </div>
                <div class="detail-row">
                    <i class="fas fa-message"></i>
                    <div class="detail-content">
                        <label>Message</label>
                        <p>${escapeHtml(message.message)}</p>
                    </div>
                </div>
                <div class="detail-row">
                    <i class="fas fa-clock"></i>
                    <div class="detail-content">
                        <label>Received</label>
                        <p>${new Date(message.timestamp).toLocaleString()}</p>
                    </div>
                </div>
            `;

            modal.classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('messageModal').classList.remove('active');
        }

        // Delete message
        function deleteMessage(id) {
            if (confirm('Are you sure you want to delete this message?')) {
                let messages = JSON.parse(localStorage.getItem('portfolio_messages') || '[]');
                messages = messages.filter(m => m.id !== id);
                localStorage.setItem('portfolio_messages', JSON.stringify(messages));
                loadMessages();
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('admin_logged_in');
                sessionStorage.removeItem('admin_login_time');
                window.location.href = 'admin-login.html';
            }
        });

        // Close modal on outside click
        document.getElementById('messageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Format date
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' min ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' hours ago';
            if (diff < 604800000) return Math.floor(diff / 86400000) + ' days ago';
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Load messages on page load
        loadMessages();
    </script>
</body>
</html>
